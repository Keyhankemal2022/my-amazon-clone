<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon.com: Online Shopping</title>
    <link rel="stylesheet" href="css/amazon.css">
</head>
<body>
    <header class="amazon-header">
        <div class="header-top">
            <div class="container">
                <a href="index.html" class="logo">
                    <img src="https://via.placeholder.com/100x40/FF9900/000000?text=amazon" alt="Amazon">
                </a>
                <div class="header-search">
                    <select class="search-select">
                        <option>All</option>
                    </select>
                    <input type="text" class="search-input" placeholder="Search Amazon">
                    <button class="search-btn">🔍</button>
                </div>
                <div class="header-actions">
                    <a href="#" class="account-link">Account & Lists</a>
                    <a href="login.html" class="auth-link">Sign In</a>
                </div>
            </div>
        </div>
    </header>

    <section class="hero-banner">
        <div class="container">
            <h1>Welcome to Amazon</h1>
            <p>Everything you need, delivered fast</p>
            <div class="auth-buttons">
                <a href="register.html" class="btn-amazon primary">Create Account</a>
                <a href="login.html" class="btn-amazon secondary">Sign In</a>
            </div>
        </div>
    </section>
</body>
</html>
