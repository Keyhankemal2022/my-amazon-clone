<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Sign In</title>
    <link rel="stylesheet" href="css/amazon.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-header">
            <img src="https://via.placeholder.com/100x40/FF9900/000000?text=amazon" alt="Amazon">
            <h1>Sign in</h1>
            <p>Stay signed in. We'll remember your selection.</p>
        </div>
        <form class="auth-form" id="loginForm">
            <div class="form-group">
                <label>Email or mobile phone number</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="auth-submit">Continue</button>
        </form>
        <p style="text-align:center;margin-top:20px;color:#565959;">New to Amazon? <a href="register.html" class="auth-link">Create your Amazon account</a></p>
        <div id="loginMessage"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
